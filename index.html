<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shou-Chiang Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1008;
    --parchment: #f5ecd7;
    --parchment-dark: #ede0c4;
    --parchment-deep: #d4c09a;
    --gold: #9a7228;
    --gold-bright: #c49a3c;
    --gold-dim: #7a5a20;
    --rust: #8b3a1a;
    --shadow: rgba(20,10,0,0.18);
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘EB Garamond’, Georgia, serif;
background: #2a1a08;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 40px 20px;
background-image:
radial-gradient(ellipse at 20% 20%, #3d2510 0%, transparent 60%),
radial-gradient(ellipse at 80% 80%, #1a0d05 0%, transparent 60%);
}

/* Noise texture overlay */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 0;
}

.container {
position: relative;
z-index: 1;
width: 100%;
max-width: 820px;
}

/* Header */
.header {
text-align: center;
margin-bottom: 36px;
animation: fadeDown 0.8s ease both;
}

.header-ornament {
color: var(–gold);
font-size: 13px;
letter-spacing: 14px;
margin-bottom: 10px;
opacity: 0.7;
}

.header h1 {
font-family: ‘Cinzel’, serif;
font-size: clamp(28px, 5vw, 46px);
font-weight: 700;
color: var(–gold-bright);
letter-spacing: 6px;
text-transform: uppercase;
line-height: 1.1;
text-shadow: 0 2px 20px rgba(196,154,60,0.3);
}

.header-sub {
font-family: ‘EB Garamond’, serif;
font-style: italic;
color: var(–parchment-deep);
font-size: 15px;
margin-top: 8px;
letter-spacing: 2px;
opacity: 0.8;
}

.header-line {
width: 200px;
height: 1px;
background: linear-gradient(to right, transparent, var(–gold), transparent);
margin: 14px auto 0;
}

/* Main card */
.card {
background: var(–parchment);
border-radius: 4px;
padding: 36px 40px;
box-shadow:
0 4px 60px rgba(0,0,0,0.6),
0 0 0 1px var(–gold-dim),
inset 0 0 80px rgba(212,192,154,0.3);
background-image:
radial-gradient(ellipse at 10% 10%, rgba(255,245,220,0.6) 0%, transparent 50%),
radial-gradient(ellipse at 90% 90%, rgba(200,170,110,0.3) 0%, transparent 50%);
position: relative;
animation: fadeUp 0.8s ease 0.1s both;
}

.card::before, .card::after {
content: ‘✦’;
position: absolute;
color: var(–gold-dim);
font-size: 11px;
opacity: 0.5;
}
.card::before { top: 12px; left: 16px; }
.card::after  { bottom: 12px; right: 16px; }

/* Mode tabs */
.mode-tabs {
display: flex;
gap: 0;
margin-bottom: 28px;
border-bottom: 1px solid var(–parchment-deep);
}

.mode-tab {
font-family: ‘Cinzel’, serif;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
padding: 8px 20px;
cursor: pointer;
color: var(–gold-dim);
border: none;
background: none;
border-bottom: 2px solid transparent;
margin-bottom: -1px;
transition: all 0.2s;
}

.mode-tab:hover { color: var(–gold); }
.mode-tab.active {
color: var(–gold);
border-bottom-color: var(–gold);
}

/* Search area */
.search-area { margin-bottom: 24px; }

.search-label {
font-family: ‘Cinzel’, serif;
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–gold-dim);
display: block;
margin-bottom: 8px;
}

.search-row {
display: flex;
gap: 10px;
}

.search-input {
flex: 1;
background: rgba(255,250,235,0.8);
border: 1px solid var(–parchment-deep);
border-radius: 2px;
padding: 11px 16px;
font-family: ‘EB Garamond’, serif;
font-size: 17px;
color: var(–ink);
outline: none;
transition: border-color 0.2s, box-shadow 0.2s;
box-shadow: inset 0 1px 4px rgba(0,0,0,0.08);
}

.search-input:focus {
border-color: var(–gold);
box-shadow: inset 0 1px 4px rgba(0,0,0,0.08), 0 0 0 2px rgba(154,114,40,0.15);
}

.search-input::placeholder { color: #b8a882; font-style: italic; }

.search-btn {
background: var(–gold);
border: none;
border-radius: 2px;
padding: 0 20px;
cursor: pointer;
font-family: ‘Cinzel’, serif;
font-size: 11px;
letter-spacing: 2px;
color: var(–parchment);
text-transform: uppercase;
transition: background 0.2s;
}
.search-btn:hover { background: var(–gold-bright); }

/* Result */
.result-area { min-height: 80px; }

.result-card {
background: rgba(255,250,235,0.5);
border: 1px solid var(–parchment-deep);
border-radius: 2px;
padding: 18px 22px;
margin-bottom: 10px;
animation: fadeIn 0.25s ease both;
}

.result-card:first-child { animation-delay: 0s; }
.result-card:nth-child(2) { animation-delay: 0.05s; }
.result-card:nth-child(3) { animation-delay: 0.1s; }
.result-card:nth-child(4) { animation-delay: 0.15s; }
.result-card:nth-child(5) { animation-delay: 0.2s; }
.result-card:nth-child(n+6) { animation-delay: 0.25s; }

.result-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; flex-wrap: wrap; }

.result-word {
font-family: ‘Cinzel’, serif;
font-size: 22px;
color: var(–gold);
font-weight: 600;
letter-spacing: 1px;
}

.result-pron {
font-style: italic;
color: var(–gold-dim);
font-size: 14px;
}

.result-cat {
margin-left: auto;
font-family: ‘Cinzel’, serif;
font-size: 9px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–parchment-deep);
background: rgba(154,114,40,0.12);
padding: 2px 8px;
border-radius: 2px;
border: 1px solid rgba(154,114,40,0.2);
}

.result-def {
font-size: 16px;
color: #3a2810;
line-height: 1.5;
}

.result-note {
font-size: 13px;
font-style: italic;
color: #7a6040;
margin-top: 3px;
}

/* No results */
.no-result {
text-align: center;
padding: 30px;
color: #9a8060;
font-style: italic;
font-size: 16px;
animation: fadeIn 0.3s ease;
}

.no-result-ornament { font-size: 20px; color: var(–gold-dim); display: block; margin-bottom: 8px; opacity: 0.4; }

/* Browse section */
.browse-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 16px;
flex-wrap: wrap;
gap: 10px;
}

.browse-title {
font-family: ‘Cinzel’, serif;
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–gold-dim);
}

.filter-row {
display: flex;
gap: 6px;
flex-wrap: wrap;
}

.filter-btn {
font-family: ‘Cinzel’, serif;
font-size: 8.5px;
letter-spacing: 1.5px;
padding: 4px 10px;
border-radius: 2px;
border: 1px solid var(–parchment-deep);
background: transparent;
color: var(–gold-dim);
cursor: pointer;
transition: all 0.15s;
text-transform: uppercase;
}
.filter-btn:hover { border-color: var(–gold); color: var(–gold); }
.filter-btn.active { background: var(–gold); color: var(–parchment); border-color: var(–gold); }

/* Browse grid */
.browse-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
gap: 6px;
max-height: 460px;
overflow-y: auto;
padding-right: 4px;
}

.browse-grid::-webkit-scrollbar { width: 4px; }
.browse-grid::-webkit-scrollbar-track { background: var(–parchment-dark); }
.browse-grid::-webkit-scrollbar-thumb { background: var(–gold-dim); border-radius: 2px; }

.browse-entry {
background: rgba(255,250,235,0.4);
border: 1px solid rgba(212,192,154,0.6);
border-radius: 2px;
padding: 8px 11px;
cursor: pointer;
transition: all 0.15s;
}

.browse-entry:hover {
background: rgba(255,250,235,0.8);
border-color: var(–gold);
transform: translateY(-1px);
box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.be-word { font-family: ‘Cinzel’, serif; font-size: 13px; color: var(–gold); display: block; }
.be-def  { font-size: 12px; color: #5a4030; margin-top: 1px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Phrase mode */
.phrase-section { margin-bottom: 20px; }
.phrase-title {
font-family: ‘Cinzel’, serif;
font-size: 9px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–gold-dim);
border-bottom: 1px solid var(–parchment-deep);
padding-bottom: 5px;
margin-bottom: 10px;
}

.phrase-row {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 6px;
margin-bottom: 5px;
padding: 7px 10px;
background: rgba(255,250,235,0.4);
border: 1px solid rgba(212,192,154,0.5);
border-radius: 2px;
cursor: pointer;
transition: all 0.15s;
}
.phrase-row:hover { background: rgba(255,250,235,0.8); border-color: var(–gold); }
.pr-sc { font-family: ‘Cinzel’, serif; font-size: 12px; color: var(–gold); }
.pr-pron { font-size: 10.5px; font-style: italic; color: var(–gold-dim); display: block; }
.pr-en  { font-size: 12.5px; color: #3a2810; }

/* Count badge */
.count-badge {
font-family: ‘Cinzel’, serif;
font-size: 9px;
color: var(–gold-dim);
letter-spacing: 1px;
margin-top: 10px;
text-align: right;
}

/* Animations */
@keyframes fadeDown {
from { opacity: 0; transform: translateY(-16px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(16px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(4px); }
to   { opacity: 1; transform: translateY(0); }
}

/* Mode panels */
.mode-panel { display: none; }
.mode-panel.active { display: block; }

/* Footer */
.footer {
text-align: center;
margin-top: 24px;
font-style: italic;
color: rgba(212,192,154,0.4);
font-size: 12px;
letter-spacing: 2px;
animation: fadeUp 0.8s ease 0.3s both;
}

/* Tooltip on click */
.copied-flash {
position: fixed;
bottom: 30px;
left: 50%;
transform: translateX(-50%);
background: var(–gold);
color: var(–parchment);
padding: 8px 20px;
border-radius: 2px;
font-family: ‘Cinzel’, serif;
font-size: 11px;
letter-spacing: 2px;
pointer-events: none;
opacity: 0;
transition: opacity 0.3s;
z-index: 100;
}
.copied-flash.show { opacity: 1; }
</style>

</head>

let currentMode = 'search';
let currentFilter = 'All';

// ══════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════
function normalise(s) {
  return s.toLowerCase().replace(/[''']/g, "'").trim();
}

function doSearch() {
  const q = normalise(document.getElementById('searchInput').value);
  const resultsEl = document.getElementById('searchResults');
  if (!q) {
    resultsEl.innerHTML = `<div class="no-result"><span class="no-result-ornament">✦</span>Enter a word to begin your search.</div>`;
    return;
  }

  const exact = [], startsWith = [], contains = [];

  DICT.forEach(entry => {
    const scN = normalise(entry.sc);
    const enN = normalise(entry.en);
    const enWords = enN.split(/[\s\/,]+/);

    if (scN === q || enWords.some(w => w === q)) {
      exact.push(entry);
    } else if (scN.startsWith(q) || enWords.some(w => w.startsWith(q))) {
      startsWith.push(entry);
    } else if (scN.includes(q) || enN.includes(q)) {
      contains.push(entry);
    }
  });

  const results = [...exact, ...startsWith, ...contains];

  if (!results.length) {
    resultsEl.innerHTML = `<div class="no-result"><span class="no-result-ornament">✦</span>No entries found for "<em>${q}</em>".<br><span style="font-size:13px;opacity:0.7;">Try a different spelling, or browse the full dictionary.</span></div>`;
    return;
  }

  resultsEl.innerHTML = results.slice(0, 12).map(e => renderResult(e)).join('');
}

function renderResult(e) {
  return `<div class="result-card" onclick="copyText('${e.sc}')">
    <div class="result-header">
      <span class="result-word">${e.sc}</span>
      <span class="result-pron">${e.pron}</span>
      <span class="result-cat">${e.cat}</span>
    </div>
    <div class="result-def">${e.en}</div>
  </div>`;
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

document.getElementById('searchInput').addEventListener('input', e => {
  if (!e.target.value) {
    document.getElementById('searchResults').innerHTML = `<div class="no-result"><span class="no-result-ornament">✦</span>Enter a word to begin your search.</div>`;
  }
});

// ══════════════════════════════════════════
// BROWSE
// ══════════════════════════════════════════
function initBrowse() {
  const cats = ['All', ...new Set(DICT.map(e => e.cat))];
  const filterRow = document.getElementById('filterRow');
  filterRow.innerHTML = cats.map(c =>
    `<button class="filter-btn${c === 'All' ? ' active' : ''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
  renderBrowse();
}

function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
  renderBrowse();
}

function renderBrowse() {
  const entries = currentFilter === 'All' ? DICT : DICT.filter(e => e.cat === currentFilter);
  document.getElementById('browseGrid').innerHTML = entries.map(e =>
    `<div class="browse-entry" onclick="copyText('${e.sc}')">
      <span class="be-word">${e.sc}</span>
      <span class="be-def">${e.en}</span>
    </div>`
  ).join('');
  document.getElementById('browseCount').textContent = `${entries.length} entries`;
}

// MODE SWITCHING
// ══════════════════════════════════════════
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`mode-${mode}`).classList.add('active');
  document.querySelectorAll('.mode-tab').forEach(t => {
    if (t.textContent.toLowerCase().includes(mode === 'search' ? 'trans' : mode)) t.classList.add('active');
  });
}

// COPY
// ══════════════════════════════════════════
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const el = document.getElementById('copiedFlash');
    el.textContent = `"${text}" copied`;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1800);
  }).catch(() => {});
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
initBrowse();
initPhrases();
</script>
